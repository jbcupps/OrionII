name: CI

# Fast feedback: type-check + test the Rust crate and frontend.
# The full Tauri MSI build runs in release-installer.yml on the same triggers
# (pull_request to main, push to main, tag pushes) so contributors see both:
#   - "the code compiles + tests pass" here, in seconds
#   - "the installer pipeline still produces a valid MSI" there, in minutes
# Runs concurrently on the same PR / push so neither blocks the other.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build and check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: orionii-ci

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Tauri crate
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Test Tauri crate
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
