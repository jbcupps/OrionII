name: Build OrionII installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-msi:
    name: Build Tauri MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri MSI with bundled NATS JetStream sidecar
        shell: pwsh
        env:
          ORIONII_NATS_SERVER_URL: ${{ vars.ORIONII_NATS_SERVER_URL }}
          ORIONII_NATS_SERVER_SHA256: ${{ vars.ORIONII_NATS_SERVER_SHA256 }}
        run: .\scripts\build-installer.ps1 -Bundles msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrionII-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Publish to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/msi/*.msi
